<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #08080c;
      --bg-subtle:    #0f0f15;
      --surface:      #1a1a24;
      --surface-2:    #22222e;
      --border:       rgba(255,255,255,0.09);
      --border-hover: rgba(255,255,255,0.16);
      --text:         #f4f4f5;
      --text-2:       #c4c4cc;
      --text-3:       #71717a;
      --text-4:       #52525b;
      --indigo:       #6366f1;
      --indigo-dim:   rgba(99,102,241,0.12);
      --indigo-hover: #818cf8;
      --up:           #22c55e;
      --up-dim:       rgba(34,197,94,0.12);
      --down:         #f43f5e;
      --down-dim:     rgba(244,63,94,0.12);
      --warn:         #f59e0b;
      --font-sans:    'Sora', system-ui, sans-serif;
      --font-mono:    'DM Mono', monospace;
    }

    html, body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Navbar ───────────────────────────────────────────────── */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,12,0.9); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 100;
    }

    .nav-left { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border: 1px solid rgba(99,102,241,0.25); border-radius: 6px;
      background: rgba(99,102,241,0.08);
      box-shadow: 0 0 10px rgba(99,102,241,0.1);
    }
    .logo-wordmark { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
    .nav-divider { width: 1px; height: 16px; background: var(--border); }
    .nav-ctx { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-user {
      display: flex; align-items: center; gap: 7px; padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
    }
    .nav-user-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--up); animation: ndot 2s ease-in-out infinite; }
    @keyframes ndot { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .btn-nav {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-3);
      font-family: var(--font-mono); font-size: 11px; cursor: pointer;
      transition: border-color .15s, color .15s; text-decoration: none;
    }
    .btn-nav:hover { border-color: var(--border-hover); color: var(--text-2); }
    .btn-nav.admin { border-color: rgba(99,102,241,0.2); color: var(--indigo); background: var(--indigo-dim); }
    .btn-nav.admin:hover { border-color: rgba(99,102,241,0.4); color: var(--indigo-hover); }

    /* ── Main ─────────────────────────────────────────────────── */
    .main { flex: 1; padding: 32px 28px 60px; max-width: 1100px; width: 100%; margin: 0 auto; }

    /* Page header */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; }
    .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.03em; }
    .page-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); margin-top: 3px; }

    .btn-add {
      display: flex; align-items: center; gap: 6px; padding: 8px 16px;
      background: var(--indigo); color: #fff; border: none; border-radius: 7px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background .15s, box-shadow .15s;
      box-shadow: 0 2px 12px rgba(99,102,241,0.2);
    }
    .btn-add:hover { background: var(--indigo-hover); box-shadow: 0 4px 20px rgba(99,102,241,0.35); }

    /* Summary bar */
    .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }

    .stat-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 18px 20px; position: relative; overflow: hidden;
      transition: border-color .2s, transform .2s;
      box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 16px rgba(0,0,0,0.5);
    }
    .stat-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }

    .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.05em; color: var(--text); }
    .stat-value.up   { color: var(--up); text-shadow: 0 0 20px rgba(34,197,94,0.3); }
    .stat-value.down { color: var(--down); text-shadow: 0 0 20px rgba(244,63,94,0.3); }
    .stat-value.ind  { color: var(--indigo-hover); }

    /* Monitor grid */
    .monitors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

    /* Monitor card */
    .monitor-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 11px;
      overflow: hidden; transition: border-color .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 24px rgba(0,0,0,0.6);
    }
    .monitor-card:hover { border-color: rgba(255,255,255,0.16); transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,0.07) inset, 0 8px 32px rgba(0,0,0,0.65); }
    .monitor-card.status-down { border-color: rgba(244,63,94,0.3); box-shadow: 0 4px 24px rgba(244,63,94,0.12); }
    .monitor-card.status-up   { border-color: rgba(34,197,94,0.15); }

    /* Card top accent line */
    .card-accent { height: 2px; width: 100%; }
    .card-accent.up      { background: linear-gradient(90deg, transparent, rgba(34,197,94,0.5), transparent); }
    .card-accent.down    { background: linear-gradient(90deg, transparent, rgba(244,63,94,0.5), transparent); }
    .card-accent.pending { background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 16px 10px; gap: 12px; }
    .card-name-row { flex: 1; min-width: 0; }
    .card-name { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .card-url { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-badge {
      display: flex; align-items: center; gap: 5px; padding: 3px 9px;
      border-radius: 99px; font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: .04em; flex-shrink: 0;
    }
    .status-badge.up      { background: var(--up-dim);   color: var(--up);   border: 1px solid rgba(34,197,94,0.2); }
    .status-badge.down    { background: var(--down-dim); color: var(--down); border: 1px solid rgba(244,63,94,0.2); }
    .status-badge.pending { background: var(--indigo-dim); color: var(--indigo-hover); border: 1px solid rgba(99,102,241,0.2); }

    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge-dot.anim { animation: bdot 2s ease-in-out infinite; }
    @keyframes bdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

    /* Stats row */
    .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); background: rgba(0,0,0,0.12); }
    .card-stat { padding: 11px 14px; border-right: 1px solid var(--border); }
    .card-stat:last-child { border-right: none; }
    .cs-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
    .cs-value { font-family: var(--font-mono); font-size: 13px; color: var(--text); font-weight: 500; }

    /* Chart */
    .card-chart { padding: 12px 14px 14px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
    .chart-label { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-3); margin-bottom: 8px; }
    .chart-wrap { height: 48px; }

    /* Actions */
    .card-actions { display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); }
    .btn-action {
      display: flex; align-items: center; gap: 5px; padding: 5px 9px;
      border: 1px solid var(--border); border-radius: 5px;
      background: rgba(255,255,255,0.03); color: var(--text-2);
      font-family: var(--font-mono); font-size: 10.5px; cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
    }
    .btn-action:hover { border-color: var(--border-hover); color: var(--text); background: rgba(255,255,255,0.05); }
    .btn-action.danger:hover { border-color: rgba(244,63,94,0.3); color: var(--down); background: var(--down-dim); }
    .last-checked { margin-left: auto; font-family: var(--font-mono); font-size: 9.5px; color: var(--text-3); }

    /* Skeleton */
    .skeleton {
      background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
      height: 210px; overflow: hidden; position: relative;
    }
    .skeleton::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.025), transparent);
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 72px 20px; text-align: center;
      border: 1px dashed rgba(255,255,255,0.07); border-radius: 12px;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(99,102,241,0.04) 0%, transparent 100%);
    }
    .empty-icon {
      width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(99,102,241,0.2); border-radius: 11px;
      background: var(--indigo-dim); margin-bottom: 18px;
      box-shadow: 0 0 20px rgba(99,102,241,0.1);
    }
    .empty-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
    .empty-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); margin-bottom: 24px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border-hover); border-radius: 13px;
      width: 100%; max-width: 440px; overflow: hidden;
      animation: mIn .15s ease-out;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    }
    @keyframes mIn { from{opacity:0;transform:translateY(8px) scale(0.98)} to{opacity:1;transform:none} }

    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .btn-close {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 5px;
      background: transparent; color: var(--text-3); cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    .btn-close:hover { border-color: var(--border-hover); color: var(--text-2); }

    .modal-body { padding: 20px; }
    .modal-footer {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      padding: 14px 20px; border-top: 1px solid var(--border);
    }

    .mfield { margin-bottom: 16px; }
    .mfield label { display: block; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-3); letter-spacing: .03em; margin-bottom: 6px; }
    .mfield input, .mfield select {
      width: 100%; padding: 9px 11px; background: var(--bg-subtle);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-family: var(--font-mono); font-size: 12.5px;
      outline: none; transition: border-color .15s, box-shadow .15s; -webkit-appearance: none;
    }
    .mfield input:focus, .mfield select:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
    .mfield input::placeholder { color: var(--text-4); }
    .mfield select option { background: #18181b; }
    .mfield-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: var(--bg-subtle); border: 1px solid var(--border);
      border-radius: 7px; margin-bottom: 10px;
    }
    .toggle-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); }
    .toggle-switch { position: relative; width: 32px; height: 18px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 99px; cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .toggle-track::before {
      content: ''; position: absolute; width: 12px; height: 12px; border-radius: 50%;
      background: var(--text-4); top: 2px; left: 2px; transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--indigo-dim); border-color: rgba(99,102,241,0.3); }
    .toggle-switch input:checked + .toggle-track::before { transform: translateX(14px); background: var(--indigo); }

    .modal-error { display:none; padding:8px 11px; border:1px solid rgba(244,63,94,0.2); border-radius:6px; background:var(--down-dim); font-family:var(--font-mono); font-size:11px; color:#fb7185; margin-bottom:14px; }
    .modal-error.show { display: block; }

    .btn-primary {
      padding: 8px 16px; background: var(--indigo); color: #fff; border: none; border-radius: 7px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }
    .btn-primary:hover { background: var(--indigo-hover); box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }

    .btn-ghost {
      padding: 8px 14px; background: transparent; color: var(--text-3);
      border: 1px solid var(--border); border-radius: 7px;
      font-family: var(--font-sans); font-size: 13px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text-2); }

    .btn-danger {
      padding: 8px 14px; background: var(--down-dim); color: var(--down);
      border: 1px solid rgba(244,63,94,0.2); border-radius: 7px;
      font-family: var(--font-sans); font-size: 13px; cursor: pointer;
      transition: background .15s;
    }
    .btn-danger:hover { background: rgba(244,63,94,0.15); }

    /* Toast */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      display: flex; align-items: center; gap: 9px; padding: 10px 14px;
      background: var(--surface-2); border: 1px solid var(--border-hover); border-radius: 8px;
      font-family: var(--font-mono); font-size: 11.5px; color: var(--text-2);
      animation: tIn .2s ease-out; box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    }
    .toast.success { border-color: rgba(34,197,94,0.2); }
    .toast.error   { border-color: rgba(244,63,94,0.2); color: #fb7185; }
    @keyframes tIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .confirm-msg { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 6px; }
    .confirm-url { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }

    @media (max-width:768px) {
      /* Navbar */
      .navbar { padding: 0 14px; height: 48px; }
      .nav-ctx, .nav-divider { display: none; }
      .nav-user { max-width: 130px; }
      .nav-user span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; display: block; }
      .btn-nav svg + * { display: none; }
      .btn-nav { padding: 5px 8px; }

      /* Main */
      .main { padding: 18px 14px 60px; }

      /* Page header */
      .page-header { flex-direction: column; align-items: stretch; gap: 12px; margin-bottom: 20px; }
      .btn-add { width: 100%; justify-content: center; }

      /* Summary bar — 2 cols */
      .summary-bar { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
      .stat-value { font-size: 22px; }

      /* Monitor grid — single col */
      .monitors-grid { grid-template-columns: 1fr; gap: 12px; }

      /* Modal — bottom sheet on mobile */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal { max-width: 100%; border-radius: 16px 16px 0 0; max-height: 92vh; overflow-y: auto; }
      .mfield-row { grid-template-columns: 1fr; }

      /* Toast */
      .toast-wrap { bottom: 16px; right: 12px; left: 12px; }
      .toast { width: 100%; }
    }

    @media (max-width:400px) {
      .stat-card { padding: 14px; }
      .stat-label { font-size: 9px; }
      .stat-value { font-size: 20px; }
      .card-stats { grid-template-columns: repeat(3,1fr); }
      .cs-label { font-size: 8.5px; }
      .cs-value { font-size: 11.5px; }
    }
  </style>
</head>
<body>
<div class="app">

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="logo-wordmark">Pulse</span>
      <div class="nav-divider"></div>
      <span class="nav-ctx">dashboard</span>
    </div>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-user-dot"></div>
        <span id="nav-email">—</span>
      </div>
      <a id="admin-link" href="/admin" style="display:none;" class="btn-nav admin">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Admin
      </a>
      <button class="btn-nav" onclick="logout()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Monitors</h1>
        <p class="page-meta" id="page-meta">Loading...</p>
      </div>
      <button class="btn-add" onclick="openAddModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add monitor
      </button>
    </div>

    <div class="summary-bar">
      <div class="stat-card">
        <div class="stat-label">Total monitors</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Online</div>
        <div class="stat-value up" id="stat-up">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Offline</div>
        <div class="stat-value down" id="stat-down">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg uptime (24h)</div>
        <div class="stat-value ind" id="stat-uptime">—</div>
      </div>
    </div>

    <div class="monitors-grid" id="monitors-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </main>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="monitor-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">Add monitor</span>
      <button class="btn-close" onclick="closeModal('monitor-modal')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="modal-error" id="modal-error"></div>
      <div class="mfield"><label>Monitor name</label><input type="text" id="m-name" placeholder="Production API" maxlength="100" /></div>
      <div class="mfield"><label>URL to monitor</label><input type="url" id="m-url" placeholder="https://api.example.com/health" /></div>
      <div class="mfield-row">
        <div class="mfield">
          <label>Check interval</label>
          <select id="m-interval">
            <option value="1">Every 1 min</option><option value="2">Every 2 min</option>
            <option value="3">Every 3 min</option><option value="5" selected>Every 5 min</option>
            <option value="10">Every 10 min</option><option value="15">Every 15 min</option>
            <option value="30">Every 30 min</option><option value="60">Every 60 min</option>
          </select>
        </div>
        <div class="mfield"><label>Alert email <span style="color:var(--text-4)">(optional)</span></label><input type="email" id="m-alert-email" placeholder="you@example.com" /></div>
      </div>
      <div class="toggle-row"><span class="toggle-label">Alert when down</span><label class="toggle-switch"><input type="checkbox" id="m-alert-down" checked /><span class="toggle-track"></span></label></div>
      <div class="toggle-row"><span class="toggle-label">Alert on recovery</span><label class="toggle-switch"><input type="checkbox" id="m-alert-recovery" checked /><span class="toggle-track"></span></label></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('monitor-modal')">Cancel</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveMonitor()">Add monitor</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Delete monitor</span>
      <button class="btn-close" onclick="closeModal('confirm-modal')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <p class="confirm-msg">This will permanently remove the monitor and all associated ping history.</p>
      <p class="confirm-url" id="confirm-url"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn-danger" id="confirm-delete-btn" onclick="confirmDelete()">Delete monitor</button>
    </div>
  </div>
</div>

<script>
const API = '/api/pulse', TOKEN_KEY = 'pulse_token', REFRESH = 30000;
const token = localStorage.getItem(TOKEN_KEY);
if (!token) window.location.replace('/');

function getEmailFromToken(t) { try { return JSON.parse(atob(t.split('.')[1])).email||'—'; } catch{return'—';} }
document.getElementById('nav-email').textContent = getEmailFromToken(token);

try {
  const p = JSON.parse(atob(token.split('.')[1]));
  if (p.role === 'admin') document.getElementById('admin-link').style.display = 'flex';
} catch {}

async function apiFetch(path, opts={}) {
  const res = await fetch(`${API}${path}`, { ...opts, headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{}) } });
  if (res.status===401) { localStorage.removeItem(TOKEN_KEY); window.location.replace('/'); return; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.message||'Request failed');
  return data;
}

let monitors=[], editingId=null, deletingId=null;
const charts={};

async function loadMonitors() {
  try {
    const data = await apiFetch('/monitors');
    if (!data) return;
    monitors = data.monitors||[];
    renderAll();
  } catch(err) {
    showToast(err.message,'error');
    document.getElementById('monitors-grid').innerHTML = `<p style="color:var(--text-3);font-family:var(--font-mono);font-size:12px;grid-column:1/-1;">Failed to load. ${err.message}</p>`;
  }
}

function renderAll() {
  const total=monitors.length, up=monitors.filter(m=>m.status==='up').length, down=monitors.filter(m=>m.status==='down').length;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-up').textContent=up;
  document.getElementById('stat-down').textContent=down;
  document.getElementById('stat-uptime').textContent=total===0?'—':`${(up/total*100).toFixed(1)}%`;
  document.getElementById('page-meta').textContent=total===0?'No monitors yet':`${total} monitor${total!==1?'s':''} · refreshes every 30s`;
  renderGrid();
}

function renderGrid() {
  const grid=document.getElementById('monitors-grid');
  if (!monitors.length) {
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.75" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="empty-title">No monitors yet</div><div class="empty-sub">// Add your first URL to start monitoring</div><button class="btn-add" onclick="openAddModal()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add monitor</button></div>`;
    return;
  }
  Object.values(charts).forEach(c=>c.destroy()); Object.keys(charts).forEach(k=>delete charts[k]);
  grid.innerHTML=monitors.map(m=>buildCard(m)).join('');
  monitors.forEach(m=>loadChart(m._id));
}

function buildCard(m) {
  const s=m.status||'pending';
  const label={up:'UP',down:'DOWN',pending:'PENDING'}[s];
  const dotCls=s==='up'?'badge-dot anim':'badge-dot';
  return `<div class="monitor-card status-${s}">
    <div class="card-accent ${s}"></div>
    <div class="card-header">
      <div class="card-name-row"><div class="card-name">${esc(m.name)}</div><div class="card-url">${esc(m.url)}</div></div>
      <div class="status-badge ${s}"><div class="${dotCls}"></div>${label}</div>
    </div>
    <div class="card-stats">
      <div class="card-stat"><div class="cs-label">Response</div><div class="cs-value">${m.lastResponseTime!=null?m.lastResponseTime+'ms':'—'}</div></div>
      <div class="card-stat"><div class="cs-label">Status</div><div class="cs-value">${m.lastStatusCode!=null?m.lastStatusCode:'—'}</div></div>
      <div class="card-stat"><div class="cs-label">Interval</div><div class="cs-value">${m.interval}m</div></div>
    </div>
    <div class="card-chart">
      <div class="chart-label">Response time — last 24 checks</div>
      <div class="chart-wrap"><canvas id="chart-${m._id}" height="48"></canvas></div>
    </div>
    <div class="card-actions">
      <button class="btn-action" onclick="openEditModal('${m._id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</button>
      <button class="btn-action danger" onclick="openConfirmDelete('${m._id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>Delete</button>
      <span class="last-checked">${m.lastCheckedAt?timeAgo(new Date(m.lastCheckedAt)):'never'}</span>
    </div>
  </div>`;
}

async function loadChart(id) {
  try {
    const data=await apiFetch(`/monitors/${id}/stats`);
    renderChart(id, data.recentPings||[]);
  } catch {}
}

function renderChart(id, pings) {
  const canvas=document.getElementById(`chart-${id}`);
  if (!canvas) return;
  charts[id]=new Chart(canvas,{
    type:'bar',
    data:{ labels:pings.map((_,i)=>i+1), datasets:[{ data:pings.map(p=>p.responseTime), backgroundColor:pings.map(p=>p.status==='up'?'rgba(99,102,241,0.7)':'rgba(244,63,94,0.7)'), borderRadius:2, borderSkipped:false }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>ctx.raw!=null?`${ctx.raw}ms`:'timeout', title:()=>'' }, backgroundColor:'#18181b', borderColor:'rgba(255,255,255,0.08)', borderWidth:1, padding:8, bodyColor:'#a1a1aa', bodyFont:{family:"'DM Mono',monospace",size:11} } }, scales:{ x:{display:false}, y:{display:false,beginAtZero:true,grace:'10%'} } }
  });
}

function openAddModal() {
  editingId=null;
  document.getElementById('modal-title').textContent='Add monitor';
  document.getElementById('modal-save-btn').textContent='Add monitor';
  ['m-name','m-url','m-alert-email'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-interval').value='5';
  document.getElementById('m-alert-down').checked=true;
  document.getElementById('m-alert-recovery').checked=true;
  hideModalError(); openModal('monitor-modal');
  setTimeout(()=>document.getElementById('m-name').focus(),100);
}

function openEditModal(id) {
  const m=monitors.find(x=>x._id===id); if(!m) return;
  editingId=id;
  document.getElementById('modal-title').textContent='Edit monitor';
  document.getElementById('modal-save-btn').textContent='Save changes';
  document.getElementById('m-name').value=m.name;
  document.getElementById('m-url').value=m.url;
  document.getElementById('m-interval').value=String(m.interval);
  document.getElementById('m-alert-email').value=m.alertEmail||'';
  document.getElementById('m-alert-down').checked=m.alertOnDown!==false;
  document.getElementById('m-alert-recovery').checked=m.alertOnRecovery!==false;
  hideModalError(); openModal('monitor-modal');
}

async function saveMonitor() {
  const name=document.getElementById('m-name').value.trim(), url=document.getElementById('m-url').value.trim();
  const interval=document.getElementById('m-interval').value, alertEmail=document.getElementById('m-alert-email').value.trim();
  const alertOnDown=document.getElementById('m-alert-down').checked, alertOnRecovery=document.getElementById('m-alert-recovery').checked;
  if (!name) return showModalError('Monitor name is required.');
  if (!url)  return showModalError('URL is required.');
  try { new URL(url); } catch { return showModalError('Enter a valid URL (include https://).'); }
  const btn=document.getElementById('modal-save-btn'); btn.disabled=true; btn.textContent='Saving...'; hideModalError();
  try {
    const body={name,url,interval:parseInt(interval),alertOnDown,alertOnRecovery};
    if(alertEmail) body.alertEmail=alertEmail;
    if(editingId) { await apiFetch(`/monitors/${editingId}`,{method:'PATCH',body:JSON.stringify(body)}); showToast('Monitor updated','success'); }
    else { await apiFetch('/monitors',{method:'POST',body:JSON.stringify(body)}); showToast('Monitor added','success'); }
    closeModal('monitor-modal'); await loadMonitors();
  } catch(err) { showModalError(err.message); }
  finally { btn.disabled=false; btn.textContent=editingId?'Save changes':'Add monitor'; }
}

function openConfirmDelete(id) {
  const m=monitors.find(x=>x._id===id); if(!m) return;
  deletingId=id; document.getElementById('confirm-url').textContent=m.url; openModal('confirm-modal');
}

async function confirmDelete() {
  if(!deletingId) return;
  const btn=document.getElementById('confirm-delete-btn'); btn.disabled=true; btn.textContent='Deleting...';
  try { await apiFetch(`/monitors/${deletingId}`,{method:'DELETE'}); closeModal('confirm-modal'); showToast('Monitor deleted','success'); await loadMonitors(); }
  catch(err) { showToast(err.message,'error'); }
  finally { btn.disabled=false; btn.textContent='Delete monitor'; deletingId=null; }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showModalError(msg) { const el=document.getElementById('modal-error'); el.textContent=msg; el.classList.add('show'); }
function hideModalError() { document.getElementById('modal-error').classList.remove('show'); }

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));
['m-name','m-url','m-alert-email'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') saveMonitor(); }); });

function showToast(msg,type='success') {
  const wrap=document.getElementById('toast-wrap'), t=document.createElement('div');
  const icon=type==='success'?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  t.className=`toast ${type}`; t.innerHTML=`${icon}<span>${esc(msg)}</span>`;
  wrap.appendChild(t); setTimeout(()=>t.remove(),3500);
}

function logout() { localStorage.removeItem(TOKEN_KEY); window.location.replace('/'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function timeAgo(d) { const s=Math.floor((Date.now()-d)/1000); if(s<60) return 'just now'; if(s<3600) return `${Math.floor(s/60)}m ago`; if(s<86400) return `${Math.floor(s/3600)}h ago`; return `${Math.floor(s/86400)}d ago`; }

loadMonitors();
setInterval(loadMonitors, REFRESH);
</script>
</body>
</html>
